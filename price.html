<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>ZOZO Studios</title>
</head>


<body>


    <div class="header-container-contact" >
        <header>
            <p><b>Price List</b></p>
        </header>
        <img src="images/menu.png" alt="menu" class="menu-icon">
    </div>


    <div class="menu-overlay" id="siteMenu" aria-hidden="true">
        <button class="menu-close" id="menuClose" aria-label="Close menu">×</button>
        <nav class="menu-list">
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="policy.html">Policy</a>
            <a href="bookingInfo.html">How to Book</a>
            <a href="price.html">Price List</a>
            <a href="Collection.html">Monthly Collection</a>
            <a href="bookingInfo.html">Booking Site</a>
            <a href="Contact-freq.html">Contact / FAQ</a>
        </nav>
    </div>



    <main class="body-container-price">

        <div class = "content-price">
            <div class ="content-left-price">
                <p><b>All listed prices are estimates. 5% GST excluded.</b></p>
                <button><span class="text">Monthly Design</span><span class="price">$75+</span></button>
                <button><span class="text">Freestyle</span> <span class="price">$95+</span></button>
                <button><span class="text">Design Recreation</span> <span class="price">Price Varies</span></button>
            </div>

            <div class ="content-right-price">
                <button><span class="text">Removal</span> <span class="price">Add-on</span></button>
                <button><span class="text">Gel X Extension</span> <span class="price">Add-on</span></button>
                <button><span class="text">Enhancement</span> <span class="price">Add-on</span></button>
                <button><span class="text">Note</span></button>           
            </div>
        </div>


   

    </main>

    

    <footer>
        <p>footer,sns,q&a</p>
        <p>©2026 ZOZOSTUDIOS.</p>
    </footer>

    <script>
        const menuToggle = document.querySelector('.menu-icon');
        const menuClose = document.querySelector('.menu-close');
        const siteMenu = document.querySelector('.menu-overlay');

        if (menuToggle && menuClose && siteMenu) {
            menuToggle.addEventListener('click', () => {
                siteMenu.classList.add('open');
                siteMenu.setAttribute('aria-hidden', 'false');
            });

            menuClose.addEventListener('click', () => {
                siteMenu.classList.remove('open');
                siteMenu.setAttribute('aria-hidden', 'true');
            });

            siteMenu.addEventListener('click', event => {
                if (event.target === siteMenu) {
                    siteMenu.classList.remove('open');
                    siteMenu.setAttribute('aria-hidden', 'true');
                }
            });
        }
    </script>
</body>
</html>
